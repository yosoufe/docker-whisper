name: whisper_test

on: workflow_call

jobs:
  whisper_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        test_id: [no-env, with-env, with-key, with-diarize]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld whisper.env.example

          sed -i \
            -e '/WHISPER_LOG_LEVEL=/s/# //' \
            -e '/WHISPER_BEAM=/s/# //' \
            whisper.env.example

          set -x

          docker build -t whisper-test .

          if [ "$TEST_ID" = "with-diarize" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v whisper-test-data:/var/lib/whisper \
              -e WHISPER_MODEL=tiny \
              -e WHISPER_DIARIZATION=true \
              -p 9000:9000/tcp \
              -d whisper-test
          elif [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v whisper-test-data:/var/lib/whisper \
              -v ./whisper.env.example:/whisper.env:ro \
              -e WHISPER_MODEL=tiny \
              -p 9000:9000/tcp \
              -d whisper-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v whisper-test-data:/var/lib/whisper \
              -e WHISPER_MODEL=tiny \
              -p 9000:9000/tcp \
              -d whisper-test
          elif [ "$TEST_ID" = "with-key" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v whisper-test-data:/var/lib/whisper \
              -e WHISPER_MODEL=tiny \
              -e WHISPER_API_KEY=test-whisper-key \
              -p 9000:9000/tcp \
              -d whisper-test
          fi

          # Wait for server to be ready (up to 300 seconds for model download)
          i=0
          while [ "$i" -lt 300 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:9000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify health endpoint
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:9000/health

          # Build optional auth header args
          whisper_curl_args=()
          [ "$TEST_ID" = "with-key" ] && whisper_curl_args=(-H "Authorization: Bearer test-whisper-key")

          # Test auth enforcement when WHISPER_API_KEY is set
          if [ "$TEST_ID" = "with-key" ]; then
            http_code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://127.0.0.1:9000/v1/models 2>/dev/null || true)
            [ "$http_code" = "401" ] || { echo "Expected 401 without key, got $http_code"; exit 1; }
          fi

          # Verify models endpoint
          curl -sf http://127.0.0.1:9000/v1/models \
            "${whisper_curl_args[@]}" \
            | grep -q '"object"'

          # Test whisper_manage commands
          docker exec "$TEST_ID" whisper_manage --showinfo
          docker exec "$TEST_ID" whisper_manage --listmodels

          # Test whisper_manage --downloadmodel (download already-cached model; verifies command works)
          docker exec "$TEST_ID" whisper_manage --downloadmodel tiny

          # Generate a minimal test audio file and test the transcription endpoint
          if [ ! -x /usr/bin/ffmpeg ]; then
            export DEBIAN_FRONTEND=noninteractive
            sudo apt-get -yqq update
            sudo apt-get -yqq install ffmpeg
          fi
          ffmpeg -y -f lavfi -i "sine=frequency=440:duration=1" -ar 16000 -ac 1 /tmp/test.wav

          # Test transcription endpoint (json format)
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 \
            | grep -q '"text"'

          # Test transcription endpoint (text format)
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F response_format=text

          # Test transcription endpoint (verbose_json format)
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F response_format=verbose_json \
            | grep -q '"segments"'

          # Test transcription endpoint (srt format)
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F response_format=srt

          # Test transcription endpoint (vtt format)
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F response_format=vtt

          # Test transcription endpoint with explicit language
          curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F language=en \
            | grep -q '"text"'

          # Test streaming transcription endpoint (stream=true, SSE)
          stream_output=$(curl -sN http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F stream=true)
          echo "$stream_output" | grep -q '"transcript.text.done"'
          echo "$stream_output" | grep -q '\[DONE\]'

          # Test word-level timestamps (verbose_json with timestamp_granularities[]=word)
          wt_output=$(curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 \
            -F response_format=verbose_json -F "timestamp_granularities[]=word")
          echo "$wt_output" | grep -q '"words"'

          # Test translation endpoint (json format)
          curl -sf http://127.0.0.1:9000/v1/audio/translations \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 \
            | grep -q '"text"'

          # Test translation endpoint (verbose_json format)
          curl -sf http://127.0.0.1:9000/v1/audio/translations \
            "${whisper_curl_args[@]}" \
            -F file=@/tmp/test.wav -F model=whisper-1 -F response_format=verbose_json \
            | grep -q '"translate"'

          # Test diarization output (only when WHISPER_DIARIZATION=true)
          if [ "$TEST_ID" = "with-diarize" ]; then
            # Verify diarization module loaded
            docker logs "$TEST_ID" 2>&1 | grep -qi 'diariz'

            # Generate longer audio to ensure transcription segments are produced
            ffmpeg -y -f lavfi \
              -i "sine=frequency=300:duration=5,volume=0.8" \
              -ar 16000 -ac 1 /tmp/test_diarize.wav

            # Test verbose_json includes speaker field when segments exist
            diarize_output=$(curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
              -F file=@/tmp/test_diarize.wav -F model=whisper-1 -F response_format=verbose_json)
            echo "$diarize_output"
            # If segments are non-empty, speaker field must be present
            if echo "$diarize_output" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('segments') else 1)" 2>/dev/null; then
              echo "$diarize_output" | grep -q '"speaker"'
              # Test srt format includes speaker label
              srt_output=$(curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
                -F file=@/tmp/test_diarize.wav -F model=whisper-1 -F response_format=srt)
              echo "$srt_output" | grep -q 'SPEAKER_'
              # Test text format includes speaker label
              text_output=$(curl -sf http://127.0.0.1:9000/v1/audio/transcriptions \
                -F file=@/tmp/test_diarize.wav -F model=whisper-1 -F response_format=text)
              echo "$text_output" | grep -q 'SPEAKER_'
            else
              echo "No segments produced (VAD filtered); skipping speaker label assertions"
            fi

            # Test whisper_manage --downloaddiarize
            docker exec "$TEST_ID" whisper_manage --downloaddiarize
          fi

          docker restart "$TEST_ID"

          sleep 15

          # Wait for server to come back (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:9000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify server is healthy after restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:9000/health

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm whisper-test-data || true
          docker rmi whisper-test || true